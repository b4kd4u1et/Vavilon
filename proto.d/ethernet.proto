6*byte getThisNICAddress():
  core.NICDriver.getNICInfo()

6*byte getDestinationAddressFromPacket()&
6*byte getSourceAddressFromPacket()&
2*byte getTypeFromPacket():
  switch parserFlag:
    case parserFlag is b0  #If data from Server's port listner
      core.ServerDriver.getDataFromPacket()
    case parserFlag is b1  #If data from Protocol parser
      this.getFromStack(14*byte)

writeToNewFile():
  core.FSDriver.newFile(fileName)
  core.FSDriver.writeToFile(fileName)
