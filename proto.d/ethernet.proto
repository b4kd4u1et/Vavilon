init mynic:6
set mynic < getThisNICAddress()

init destination:6
set destination < getDestinationAddressFromPacket()

init source:6
set source < getSourceAddressFromPacket()

init type:2
set type < getTypeFromPacket()
  
if mynic == destination:
  remove mynic



  init ethernetDataStruct
  get destination&source&type > writeEthernetDataToFile(ethernetDataStruct)

  remove destination
  remove source
  remove type

  write ethernetDataStruct > writeToNewFile()
  remove ethernetDataStruct
  
  endif
